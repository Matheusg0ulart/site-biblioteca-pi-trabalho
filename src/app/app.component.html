<div class="layout">

  <aside class="sidebar" [class.fechar]="menuFechado">

    <div class="brand">
      <div class="brand-mark">B</div>
      <div class="brand-copy">
        <span>Biblioteca</span>
        <small>Gestão de acervo</small>
      </div>
    </div>

    <nav class="menu">
      <button class="menu-btn" [class.active]="tela == 'home'" (click)="tela = 'home'">
        <span class="menu-icon">H</span>
        <span>Home</span>
      </button>

      <button class="menu-btn" [class.active]="tela == 'autores'" (click)="tela = 'autores'">
        <span class="menu-icon">A</span>
        <span>Autores</span>
      </button>

      <button class="menu-btn" [class.active]="tela == 'livros'" (click)="tela = 'livros'">
        <span class="menu-icon">L</span>
        <span>Livros</span>
      </button>

      <button class="menu-btn" [class.active]="tela == 'clientes'" (click)="tela = 'clientes'">
        <span class="menu-icon">C</span>
        <span>Clientes</span>
      </button>

      <button class="menu-btn" [class.active]="tela == 'locacoes'" (click)="clienteFiltroLocacoes = 0; tela = 'locacoes'">
        <span class="menu-icon">R</span>
        <span>Locações</span>
      </button>
    </nav>

  </aside>

  <main class="conteudo" [class.expandido]="menuFechado">

    <header class="topbar">
      <button class="hamburger" type="button" (click)="toggleMenu()" aria-label="Alternar menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div>
        <p class="page-kicker">Sistema administrativo</p>
        <h1>{{ tituloPagina }}</h1>
      </div>
    </header>

    <section class="page-shell">
      <app-home *ngIf="tela == 'home'"></app-home>
      <app-autores *ngIf="tela == 'autores'" modo="gerenciar"></app-autores>
      <app-livros *ngIf="tela == 'livros'" modo="gerenciar"></app-livros>
      <app-clientes
        *ngIf="tela == 'clientes'"
        modo="gerenciar"
        [abrirLocacoesCliente]="abrirLocacoesDoCliente.bind(this)">
      </app-clientes>
      <app-locacoes
        *ngIf="tela == 'locacoes'"
        modo="gerenciar"
        [clienteFiltroId]="clienteFiltroLocacoes">
      </app-locacoes>
    </section>

    <footer class="app-footer">
      Sistema de Biblioteca - Projeto Integrador | Feito por Matheus Goulart e Erick Santos Silva
    </footer>

  </main>

</div>
