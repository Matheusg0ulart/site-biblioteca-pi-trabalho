<div class="layout">

  <aside class="sidebar" [class.fechar]="menuFechado">

    <div class="brand">
      <div class="brand-mark">B</div>
      <div class="brand-copy">
        <span>Biblioteca</span>
        <small>Gestao de acervo</small>
      </div>
    </div>

    <nav class="menu">
      <button class="menu-btn" [class.active]="tela == 'home'" (click)="tela = 'home'">
        <span class="menu-icon">H</span>
        <span>Home</span>
      </button>

      <p class="menu-titulo">
        <span class="menu-icon">A</span>
        <span class="texto-menu">Autores</span>
      </p>

      <button class="menu-btn" [class.active]="tela == 'autores-cadastrar'" (click)="tela = 'autores-cadastrar'">
        <span class="menu-icon">+</span>
        <span>Cadastrar</span>
      </button>

      <button class="menu-btn" [class.active]="tela == 'autores-consultar'" (click)="tela = 'autores-consultar'">
        <span class="menu-icon">?</span>
        <span>Consultar</span>
      </button>

      <p class="menu-titulo">
        <span class="menu-icon">L</span>
        <span class="texto-menu">Livros</span>
      </p>

      <button class="menu-btn" [class.active]="tela == 'livros-cadastrar'" (click)="tela = 'livros-cadastrar'">
        <span class="menu-icon">+</span>
        <span>Cadastrar</span>
      </button>

      <button class="menu-btn" [class.active]="tela == 'livros-consultar'" (click)="tela = 'livros-consultar'">
        <span class="menu-icon">?</span>
        <span>Consultar</span>
      </button>
    </nav>

  </aside>

  <main class="conteudo" [class.expandido]="menuFechado">

    <header class="topbar">
      <button class="hamburger" type="button" (click)="toggleMenu()" aria-label="Alternar menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div>
        <p class="page-kicker">Sistema administrativo</p>
        <h1>Biblioteca</h1>
      </div>
    </header>

    <section class="page-shell">
      <app-home *ngIf="tela == 'home'"></app-home>
      <app-autores *ngIf="tela == 'autores-cadastrar'" modo="cadastrar"></app-autores>
      <app-autores *ngIf="tela == 'autores-consultar'" modo="consultar"></app-autores>
      <app-livros *ngIf="tela == 'livros-cadastrar'" modo="cadastrar"></app-livros>
      <app-livros *ngIf="tela == 'livros-consultar'" modo="consultar"></app-livros>
    </section>

  </main>

</div>
