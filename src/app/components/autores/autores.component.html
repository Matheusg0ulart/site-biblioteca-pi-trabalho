<div class="container mt-5">

  <div class="card">

    <div *ngIf="modo == 'cadastrar' || editando">

      <h2 class="mb-4">
        {{ editando ? 'Editar Autor' : 'Cadastro de Autores' }}
      </h2>

      <form>

        <div class="mb-3">
          <label class="form-label">Nome</label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="autor.nome"
            name="nome">
        </div>

        <div class="mb-3">
          <label class="form-label">Data de Nascimento</label>

          <input
            type="date"
            class="form-control"
            [(ngModel)]="autor.dataNascimento"
            name="dataNascimento">
        </div>

        <div class="mb-3">
          <label class="form-label">Nacionalidade</label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="autor.nacionalidade"
            name="nacionalidade">
        </div>

        <button
          *ngIf="!editando"
          type="button"
          class="btn btn-primary"
          (click)="salvar()">

          Salvar

        </button>

        <button
          *ngIf="editando"
          type="button"
          class="btn btn-success"
          (click)="atualizar()">

          Atualizar

        </button>

      </form>

    </div>

    <div *ngIf="modo == 'consultar' && !editando">

      <h2 class="mb-4">Consultar Autores</h2>

      <div class="mb-3">

        <input
          type="text"
          class="form-control"
          placeholder="Pesquisar autor por nome ou código..."
          [(ngModel)]="pesquisa"
          (input)="consultar()">

      </div>

      <table class="table table-hover table-bordered align-middle">

        <thead>

          <tr>
            <th>Código</th>
            <th>Nome</th>
            <th>Data Nascimento</th>
            <th>Nacionalidade</th>
            <th>Ações</th>
          </tr>

        </thead>

        <tbody>

          <tr *ngFor="let a of autoresFiltrados">

            <td>{{a.codigo}}</td>
            <td>{{a.nome}}</td>
            <td>{{a.dataNascimento}}</td>
            <td>{{a.nacionalidade}}</td>

            <td>

              <button
                class="btn btn-warning btn-sm me-2"
                (click)="editar(a)">

                Editar

              </button>

              <button
                class="btn btn-danger btn-sm"
                (click)="excluir(a.id)">

                Excluir

              </button>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
