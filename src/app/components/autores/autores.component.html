<div class="mb-3 mt-4">

  <input
    type="text"
    class="form-control"
    placeholder="Pesquisar autor..."
    [(ngModel)]="pesquisa"
    (input)="consultar()">

</div>

<div class="container mt-5">
    <div class="card shadow p-4">
        <div class="card">

  <h2 class="mb-4">Cadastro de Autores</h2>

  <form>

    <div class="mb-3">
      <label class="form-label">Nome</label>

      <input
        type="text"
        class="form-control"
        [(ngModel)]="autor.nome"
        name="nome">
    </div>

    <div class="mb-3">
      <label class="form-label">Data de Nascimento</label>

      <input
        type="date"
        class="form-control"
        [(ngModel)]="autor.dataNascimento"
        name="dataNascimento">
    </div>

    <div class="mb-3">
      <label class="form-label">Nacionalidade</label>

      <input
        type="text"
        class="form-control"
        [(ngModel)]="autor.nacionalidade"
        name="nacionalidade">
    </div>

  <button
  *ngIf="!editando"
  type="button"
  class="btn btn-primary"
  (click)="salvar()">

  Salvar

</button>

<button
  *ngIf="editando"
  type="button"
  class="btn btn-success"
  (click)="atualizar()">

  Atualizar

</button>

  </form>

  <hr>

  <h3>Lista de Autores</h3>

  <table class="table table-hover table-bordered align-middle">

    <thead>

      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Data Nascimento</th>
        <th>Nacionalidade</th>
        <th>Ações</th>
      </tr>

    </thead>

    <tbody>

     <tr *ngFor="let a of autoresFiltrados">

        <td>{{a.id}}</td>
        <td>{{a.nome}}</td>
        <td>{{a.dataNascimento}}</td>
        <td>{{a.nacionalidade}}</td>
        <td>

  <button
      
    class="btn btn-warning btn-sm me-2"
    (click)="editar(a)">

    Editar

  </button>

  <button
    class="btn btn-danger btn-sm"
    (click)="excluir(a.id)">

    Excluir

  </button>
  

</td>

      </tr>

    </tbody>

  </table>

</div>
</div>
</div>
