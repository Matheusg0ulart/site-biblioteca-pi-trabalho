<div class="dashboard">

  <!-- CARDS -->

  <div class="cards-dashboard">

    <div class="dash-card autores-card">

      <div class="card-info">
        <h3>Total de Autores</h3>
        <p>{{ totalAutores }}</p>
      </div>

      <div class="card-icon">
        👨‍🏫
      </div>

    </div>

    <div class="dash-card livros-card">

      <div class="card-info">
        <h3>Total de Livros</h3>
        <p>{{ totalLivros }}</p>
      </div>

      <div class="card-icon">
        📚
      </div>

    </div>

  </div>

  <!-- TABELA -->

  <div class="ultimos-livros">

    <div class="titulo-tabela">

      <h2>Últimos livros cadastrados</h2>

    </div>

    <table class="table table-hover align-middle">

      <thead>

        <tr>
          <th>ID</th>
          <th>Título</th>
          <th>Editora</th>
          <th>Gênero</th>
          <th>Publicação</th>
        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let livro of ultimosLivros">

          <td>{{ livro.id }}</td>
          <td>{{ livro.titulo }}</td>
          <td>{{ livro.editora }}</td>
          <td>{{ livro.genero }}</td>
          <td>{{ livro.dataPublicacao }}</td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
